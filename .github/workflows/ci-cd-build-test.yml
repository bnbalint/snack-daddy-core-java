name: CI/CD - Build, Test
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch: {}

env:
  MAVEN_FLAGS: "--no-transfer-progress --batch-mode --update-snapshots"
  MAVEN_PROPERTIES: "-Dmaven.repo.local=${{ github.workspace }}/.m2/repository"
  GITHUB_PACKAGES_REPOSITORY_URL: "https://maven.pkg.github.com/bnbalint/packages"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      jars-path: ${{ steps.upload.outputs.artifact-path || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and test with Maven
        run: mvn $MAVEN_FLAGS $MAVEN_PROPERTIES clean package

      - name: Upload built jars
        id: upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: maven-jars
          path: '**/target/*.jar'