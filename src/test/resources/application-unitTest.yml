spring:
  application:
    name: snack-daddy-core-java

  datasource:
    url: jdbc:postgresql://localhost:5432/snackdaddy-test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

info:
  build:
    name: ${project.name}
    version: ${project.version}
    spring_boot_version: ${spring-boot.version}
    build_time: ${timestamp}
  runtime:
    active_profiles: ${spring.profiles.active}
    java: ${java.runtime.version}

logging:
  level:
    root: INFO
#    org.bnbalint.snackdaddy: TRACE
#    org.springframework.security: TRACE
#    org.hibernate: DEBUG

